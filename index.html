<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AQASMO™ | Luxury Household Essentials</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
@font-face {
  font-family: 'Nasalization';
  src: url('fonts/nasalization-rg.ttf') format('truetype');
}

:root {
  --gold: #c8a96a;
  --dark: #0f0f0f;
  --light: #f8f8f8;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Poppins', sans-serif;
  background: var(--light);
  color: #222;
  overflow-x: hidden;
}

/* Brand */
.brand-font {
  font-family: 'Nasalization';
  letter-spacing: 1px;
}

.tm {
  font-family: 'Sakkal Majalla', serif;
  font-size: 0.6em;
  vertical-align: super;
  margin-left: 3px;
}

/* HERO */
.hero {
  height: 100dvh; /* better than 100vh on mobile */
  background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
              url('https://images.unsplash.com/photo-1618221195710-dd6b41faaea6?auto=format&fit=crop&w=1600&q=80')
              center/cover no-repeat;

  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  color: white;

  padding: 20px;
}

.hero h1 {
  font-size: clamp(2.2rem, 6vw, 4rem);
  margin-bottom: 20px;
  line-height: 1.1;
}

.hero p {
  max-width: 600px;
  margin: auto;
  font-weight: 300;
  font-size: clamp(1rem, 3.5vw, 1.2rem);
  line-height: 1.5;
}

/* BUTTON */
.btn {
  display: inline-block;
  margin-top: 30px;
  padding: 12px 26px;
  border: 1px solid var(--gold);
  color: var(--gold);
  text-decoration: none;
  transition: 0.3s;
  font-size: 1rem;
  min-width: 160px;
}

.btn:hover {
  background: var(--gold);
  color: black;
}

/* MOBILE TWEAKS */
@media (max-width: 480px) {
  .btn {
    width: 100%;
    max-width: 260px;
  }
}
</style>
</head>

<body>

<section class="hero">
  <div>
    <h1><span class="brand-font">AQASMO</span><span class="tm">™</span></h1>
    <p>Elevating everyday living with refined household essentials crafted for modern luxury.</p>
    <a href="#" class="btn">Explore Collection</a>
  </div>
</section>

</body>
</html>
