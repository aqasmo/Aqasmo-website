<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AQASMO™ | Luxury Household Essentials</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
@font-face {
  font-family: 'Nasalization';
  src: url('fonts/nasalization-rg.ttf') format('truetype');
}

:root {
  --gold: #c8a96a;
  --dark: #0f0f0f;
  --light: #f8f8f8;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Poppins', sans-serif;
  background: var(--light);
  color: #222;
}

/* HERO */
.hero {
  height: 100vh;
  background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
              url('https://images.unsplash.com/photo-1618221195710-dd6b41faaea6?auto=format&fit=crop&w=1600&q=80')
              center/cover no-repeat;

  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  color: white;
  padding: 20px;
}

/* LOGO (FIXED - CLEAN SINGLE VERSION) */
.logo {
  height: 40px;
  width: auto;
  display: block;
  margin: 0 auto 20px auto;
  filter: brightness(0) invert(1);
}

/* TEXT */
.hero p {
  max-width: 600px;
  margin: auto;
  font-weight: 300;
  font-size: 1.1rem;
  line-height: 1.5;
}

/* MOBILE */
@media (max-width: 480px) {
  .logo {
    height: 30px;
  }
}
</style>
</head>

<body>

<section class="hero">

  <div>

    <!-- SVG LOGO -->
    <img src="logo.svg" alt="AQASMO Logo" class="logo">

    <p>
      Elevating everyday living with thoughtfully designed household essentials
    </p>

  </div>

</section>

</body>
</html>
